    "imports": {
      "single-spa":  "/single-spa.min.js",
      "react":       "/react.18.2.0.production.min.js",
      "react-dom":   "/react-dom.18.2.0.production.min.js"

  }</script><script type="systemjs-importmap" id="base-importmap">{
    "imports": {
      "@linm/root-config":        "/linm-root-config.js"
    }
  }</script><script src="/system.min.js"></script><script src="/named-register.js"></script><script src="/import-map-overrides.js"></script><script>(async function() {
      try {
        const manifestUrl = '/_manifest.json';
        console.log('[Manifest Loader] Fetching:', manifestUrl);
        
        const response = await fetch(manifestUrl, {
          cache: 'no-store',
          headers: { 'Pragma': 'no-cache' }
        });
        
        if (!response.ok) {
          console.warn('[Manifest Loader] Failed to fetch manifest:', response.status);
          return;
        }
        
        const manifest = await response.json();
        console.log('[Manifest Loader] Loaded manifest:', manifest);
        
        // Merge microfrontends into SystemJS import map
        if (manifest.microfrontends && typeof System !== 'undefined' && System.set) {
          const mfImports = {};
          Object.entries(manifest.microfrontends).forEach(([name, info]) => {
            mfImports[name] = info.url;
            console.log(`  ✓ ${name} → ${info.url}`);
          });
          
          System.set('__linm_imports__', System.newModule(mfImports));
          
          // Update the importmap dynamically
          const baseMap = document.getElementById('base-importmap');
          if (baseMap) {
            const currentMap = JSON.parse(baseMap.textContent);
            const mergedMap = {
              imports: {
                ...currentMap.imports,
                ...mfImports
              }
            };
            System.set('@system-env', System.newModule({}));
            
            // Re-register the import map
            for (const [key, value] of Object.entries(mfImports)) {
              System.set(key, System.newModule({}));
            }
          }
        }
      } catch (err) {
        console.error('[Manifest Loader] Error:', err);
      }
    })();</script></head><body><div class="root-loader"><div class="root-loader__spinner"></div></div><script>System.import('@linm/root-config');</script><import-map-overrides-full show-when-local-storage="overrides-ui"></import-map-overrides-full></body></html>
